name: Policy Version Tracking

on:
  push:
    paths:
      - "policies/*.md"
    branches:
      - main

permissions:
  contents: write

jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Update policy version manifests
        run: python scripts/update_policy_versions.py

      - name: Commit version updates
        run: |
          if [ -n "$(git status --porcelain policies/versions)" ]; then
            git config user.name "barta-trust-bot"
            git config user.email "barta-trust-bot@users.noreply.github.com"
            git add policies/versions/
            git commit -m "Update policy version manifests"
            git push
          else
            echo "No version changes to commit."
          fi
